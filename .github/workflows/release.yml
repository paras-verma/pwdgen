name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: npm run build
        env:
          VITE_APP_VERSION: ${{ github.ref_name }}

      - name: Generate single-file artifact
        run: npm run build:single

      - name: Compute SHA-256
        id: hash
        run: echo "sha256=$(sha256sum build/pwdgen.html | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Rename artifact with version
        id: artifact
        run: |
          NAME="pwdgen-${{ github.ref_name }}.html"
          cp build/pwdgen.html "$NAME"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Build versioned path artifact
        run: npm run build
        env:
          VITE_APP_VERSION: ${{ github.ref_name }}
          SVELTE_BASE_PATH: /pwdgen/${{ github.ref_name }}

      - name: Deploy versioned path to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          destination_dir: ${{ github.ref_name }}
          keep_files: true

      - name: Create signed release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## pwdgen ${{ github.ref_name }}

            ### Live URLs

            | Path | Description |
            |------|-------------|
            | https://paras-verma.github.io/pwdgen/ | Latest version |
            | https://paras-verma.github.io/pwdgen/${{ github.ref_name }}/ | This release — permanent URL |

            ### Verify this release

            Download `${{ steps.artifact.outputs.name }}` from the assets below.
            It is a single self-contained HTML file — open it directly in your browser
            with no server required.

            To verify integrity, run:

            ```sh
            sha256sum ${{ steps.artifact.outputs.name }}
            ```

            Expected SHA-256:
            ```
            ${{ steps.hash.outputs.sha256 }}
            ```
          files: ${{ steps.artifact.outputs.name }}
          generate_release_notes: true
