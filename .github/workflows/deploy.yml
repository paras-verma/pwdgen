name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - run: pnpm install --frozen-lockfile

      - name: Get version
        id: version
        run: echo "tag=$(git describe --tags --abbrev=0 2>/dev/null || echo '1.0.0')" >> "$GITHUB_OUTPUT"

      - name: Build
        run: npm run build
        env:
          VITE_APP_VERSION: ${{ steps.version.outputs.tag }}

      - name: Deploy to GitHub Pages (root)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          keep_files: true
          exclude_assets: 'v*'
