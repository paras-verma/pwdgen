name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - run: pnpm install --frozen-lockfile

      - name: Get version
        id: version
        run: echo "tag=$(git describe --tags --abbrev=0 2>/dev/null || echo '1.0.0')" >> "$GITHUB_OUTPUT"

      - name: Build
        run: pnpm run build
        env:
          VITE_APP_VERSION: ${{ steps.version.outputs.tag }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build

      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
