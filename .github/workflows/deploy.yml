name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write
  attestations: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - run: pnpm install --frozen-lockfile

      - name: Determine bump type
        id: bump
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if echo "$COMMIT_MSG" | grep -qiE '\[bump major\]'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$COMMIT_MSG" | grep -qiE '\[bump minor\]'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        id: version
        run: |
          RAW=$(npm version ${{ steps.bump.outputs.type }} --no-git-tag-version)
          echo "tag=${RAW#v}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: pnpm run build
        env:
          VITE_APP_VERSION: ${{ steps.version.outputs.tag }}

      - name: Generate single-file artifact
        run: pnpm run build:single

      - name: Attest artifact
        id: attest
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: build/pwdgen.html

      - name: Hash
        id: hash
        run: echo "sha256=$(sha256sum build/pwdgen.html | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Prepare artifact
        id: artifact
        run: |
          NAME="pwdgen-v${{ steps.version.outputs.tag }}.html"
          cp build/pwdgen.html "$NAME"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Rebuild Pages with attestation URL
        run: pnpm run build
        env:
          VITE_APP_VERSION: ${{ steps.version.outputs.tag }}
          VITE_ATTESTATION_URL: ${{ steps.attest.outputs.attestation-url }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5

      - name: Commit version bump
        id: commit
        uses: planetscale/ghcommit-action@v0.2.22
        with:
          commit_message: "chore: release v${{ steps.version.outputs.tag }} [skip ci]"
          repo: ${{ github.repository }}
          branch: main
          file_pattern: "package.json"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.tag }}
          REPO: ${{ github.repository }}
          COMMIT: ${{ steps.commit.outputs.commit-hash }}
        run: |
          TAG_SHA=$(gh api /repos/$REPO/git/tags \
            -f tag="v$VERSION" -f message="v$VERSION" \
            -f object="$COMMIT" -f type=commit --jq '.sha')
          gh api /repos/$REPO/git/refs -f ref="refs/tags/v$VERSION" -f sha="$TAG_SHA"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.tag }}
          name: v${{ steps.version.outputs.tag }}
          body: |
            Built from commit [`${{ github.sha }}`](https://github.com/paras-verma/pwdgen/commit/${{ github.sha }}).

            ### Verify this release

            Download `${{ steps.artifact.outputs.name }}` and run:

            ```sh
            sha256sum ${{ steps.artifact.outputs.name }}
            ```

            Expected SHA-256:
            ```
            ${{ steps.hash.outputs.sha256 }}
            ```

            Or verify build provenance via GitHub's attestation store:

            ```sh
            gh attestation verify ${{ steps.artifact.outputs.name }} --repo paras-verma/pwdgen
            ```
          files: ${{ steps.artifact.outputs.name }}
          generate_release_notes: true
