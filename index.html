<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pwdgen</title>

  <!-- Apply saved theme before paint — regular script, runs on file:// too -->
  <script>
    (function () {
      var t = localStorage.getItem('pwdgen-theme') || 'system';
      document.documentElement.dataset.theme = t;
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* ── Light tokens ───────────────────────────── */
    :root {
      --page:         #edf1fa;
      --surface:      #ffffff;
      --surface-alt:  #f3f7fd;
      --border:       #d8deec;
      --border-soft:  #e8edf8;
      --ink:          #0e1116;
      --ink-2:        #3c434d;
      --muted:        #8792a2;
      --accent:       #2563eb;
      --accent-dim:   rgba(37, 99, 235, 0.11);
      --accent-hi:    #1d4fd7;
      --green:        #16a34a;
      --red:          #e5484d;
      --red-dim:      rgba(229, 72, 77, 0.08);
      --shadow-card:  0 20px 60px -24px rgba(14, 17, 22, 0.18),
                      0 0 0 1px rgba(14, 17, 22, 0.055);
      --shadow-btn:   0 1px 3px rgba(0, 0, 0, 0.10);
    }

    /* ── Dark tokens (explicit click) ──────────── */
    :root[data-theme="dark"] {
      --page:         #060a10;
      --surface:      #0d1117;
      --surface-alt:  #080d14;
      --border:       #1e2535;
      --border-soft:  #141c28;
      --ink:          #dde4f2;
      --ink-2:        #8b95a8;
      --muted:        #424f61;
      --accent-dim:   rgba(37, 99, 235, 0.18);
      --red-dim:      rgba(229, 72, 77, 0.11);
      --shadow-card:  0 20px 60px -24px rgba(0, 0, 0, 0.55),
                      0 0 0 1px rgba(255, 255, 255, 0.045);
      --shadow-btn:   0 1px 4px rgba(0, 0, 0, 0.40);
    }

    /* ── Dark tokens (system preference) ───────── */
    @media (prefers-color-scheme: dark) {
      :root[data-theme="system"] {
        --page:         #060a10;
        --surface:      #0d1117;
        --surface-alt:  #080d14;
        --border:       #1e2535;
        --border-soft:  #141c28;
        --ink:          #dde4f2;
        --ink-2:        #8b95a8;
        --muted:        #424f61;
        --accent-dim:   rgba(37, 99, 235, 0.18);
        --red-dim:      rgba(229, 72, 77, 0.11);
        --shadow-card:  0 20px 60px -24px rgba(0, 0, 0, 0.55),
                        0 0 0 1px rgba(255, 255, 255, 0.045);
        --shadow-btn:   0 1px 4px rgba(0, 0, 0, 0.40);
      }
    }

    /* ── Reset ──────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background: var(--page);
      font-family: 'Manrope', system-ui, -apple-system, sans-serif;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      transition: background 0.25s;
    }

    /* ── Card ───────────────────────────────────── */
    .card {
      width: 100%;
      max-width: 920px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow-card);
      overflow: hidden;
      transition: background 0.25s, border-color 0.25s, box-shadow 0.25s;
    }

    /* ── Header ─────────────────────────────────── */
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 28px;
      border-bottom: 1px solid var(--border);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brand-icon {
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--accent-dim);
      border-radius: 7px;
      color: var(--accent);
      font-size: 12px;
    }

    .brand-text {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 13px;
      font-weight: 600;
      color: var(--ink-2);
      letter-spacing: 0.03em;
    }

    .brand-text em {
      font-style: normal;
      color: var(--muted);
      font-weight: 400;
    }

    /* ── Theme toggle ────────────────────────────── */
    .theme-toggle {
      display: flex;
      align-items: center;
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 3px;
    }

    .theme-btn {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.03em;
      padding: 5px 13px;
      border: none;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s, box-shadow 0.15s;
      white-space: nowrap;
    }

    .theme-btn:hover:not(.active) { color: var(--ink-2); }

    .theme-btn.active {
      background: var(--surface);
      color: var(--ink);
      box-shadow: var(--shadow-btn);
    }

    /* ── Card body — form LEFT, results RIGHT ────── */
    .card-body {
      display: grid;
      grid-template-columns: 7fr 5fr;
      min-height: 520px;
    }

    /* ── Form panel (left) ───────────────────────── */
    .form-panel {
      order: 1;
      padding: 40px 44px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
    }

    .form-eyebrow {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--accent);
      margin-bottom: 10px;
    }

    .form-title {
      font-size: 27px;
      font-weight: 800;
      letter-spacing: -0.035em;
      line-height: 1.1;
      color: var(--ink);
      text-wrap: balance;
      margin-bottom: 10px;
    }

    .form-lede {
      font-size: 13.5px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .field { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--ink-2);
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="password"],
    input[type="number"] {
      width: 100%;
      font-family: 'Manrope', system-ui, sans-serif;
      font-size: 14.5px;
      font-weight: 500;
      color: var(--ink);
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 10px 13px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-appearance: none;
      appearance: none;
    }

    input::placeholder { color: var(--muted); font-weight: 400; }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .advanced-toggle {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 11.5px;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: 0.02em;
    }

    .chev {
      display: inline-block;
      font-size: 10px;
      transition: transform 0.2s;
    }

    .advanced-toggle.open .chev { transform: rotate(90deg); }

    .advanced-toggle:focus-visible { outline: 2px solid var(--accent); border-radius: 4px; }

    .advanced {
      margin-top: 14px;
      padding: 16px;
      background: var(--surface-alt);
      border: 1px solid var(--border-soft);
      border-radius: 10px;
    }

    .adv-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .advanced .field:last-child { margin-bottom: 0; }

    .generate-btn {
      display: block;
      width: 100%;
      margin-top: 28px;
      font-family: 'Manrope', system-ui, sans-serif;
      font-size: 14.5px;
      font-weight: 700;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: background 0.15s, transform 0.08s, opacity 0.15s;
    }

    .generate-btn:hover:not(:disabled) { background: var(--accent-hi); }
    .generate-btn:active:not(:disabled) { transform: translateY(1px); }
    .generate-btn:disabled { opacity: 0.55; cursor: default; }
    .generate-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

    /* ── Results panel (right) ───────────────────── */
    .results-panel {
      order: 2;
      background: var(--surface-alt);
      padding: 32px 28px;
      display: flex;
      flex-direction: column;
      transition: background 0.25s, border-color 0.25s;
    }

    .panel-label {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 10.5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--muted);
    }

    .panel-divider {
      height: 1px;
      margin: 14px 0;
      background: var(--border);
      position: relative;
      overflow: hidden;
    }

    .panel-divider::after {
      content: '';
      position: absolute;
      inset-block: 0;
      left: -50%;
      width: 40%;
      background: var(--accent);
      opacity: 0;
      border-radius: 1px;
    }

    .results-panel.loading .panel-divider::after {
      opacity: 1;
      animation: progress-bar 1.4s ease-in-out infinite;
    }

    @keyframes progress-bar {
      0%   { left: -45%; }
      100% { left: 120%; }
    }

    /* ── Empty state ─────────────────────────────── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      text-align: center;
    }

    .phantom-rows {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 22px;
      animation: pulse 2.8s ease-in-out infinite;
    }

    .phantom-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .phantom-num,
    .phantom-bar,
    .phantom-icon {
      background: var(--border);
      border-radius: 4px;
      flex-shrink: 0;
    }

    .phantom-num  { width: 18px; height: 9px; }
    .phantom-bar  { height: 9px; flex: 1; }
    .phantom-icon { width: 22px; height: 22px; border-radius: 6px; }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50%       { opacity: 0.22; }
    }

    .empty-label { font-size: 13px; font-weight: 600; color: var(--ink-2); }
    .empty-sub   { font-size: 12px; color: var(--muted); }

    /* ── Password list ───────────────────────────── */
    .pw-list {
      list-style: none;
      display: flex;
      flex-direction: column;
    }

    .pw-row {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border-soft);
    }

    .pw-row:first-child { padding-top: 2px; }
    .pw-row:last-child  { border-bottom: none; padding-bottom: 2px; }

    .pw-num {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 10.5px;
      color: var(--muted);
      min-width: 18px;
      text-align: right;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
      user-select: none;
    }

    .pw-value-wrap {
      flex: 1;
      min-width: 0;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 13px;
      overflow: hidden;
      white-space: nowrap;
    }

    .pw-prefix { color: var(--ink); }
    .pw-dots   { color: var(--muted); letter-spacing: 0.07em; }
    .pw-full   { color: var(--ink); }

    /* ── Icon buttons ────────────────────────────── */
    .pw-actions {
      display: flex;
      gap: 2px;
      flex-shrink: 0;
    }

    .icon-btn {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      border-radius: 7px;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      transition: color 0.12s, background 0.12s;
    }

    .icon-btn:hover   { color: var(--ink-2); background: var(--border-soft); }
    .icon-btn.active  { color: var(--accent); }
    .icon-btn.copied  { color: var(--green); }
    .icon-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }

    /* ── Error ───────────────────────────────────── */
    .error-box {
      margin-top: 2px;
      padding: 10px 12px;
      background: var(--red-dim);
      border: 1px solid rgba(229, 72, 77, 0.22);
      border-radius: 9px;
      font-size: 12.5px;
      color: var(--red);
      line-height: 1.4;
    }

    /* ── Utility ─────────────────────────────────── */
    .hidden { display: none !important; }

    /* ── Mobile ──────────────────────────────────── */
    @media (max-width: 680px) {
      body { padding: 0; align-items: flex-start; }

      .card {
        border-radius: 0;
        box-shadow: none;
        border-left: none;
        border-right: none;
        border-top: none;
        min-height: 100svh;
      }

      .card-body {
        grid-template-columns: 1fr;
        min-height: auto;
      }

      /* DOM order: form-panel first → top; results-panel second → bottom */
      .form-panel {
        order: 1;
        padding: 28px 22px 24px;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }

      .results-panel {
        order: 2;
        padding: 24px 22px 28px;
        min-height: 260px;
      }

      .card-header { padding: 14px 18px; }
      .form-title  { font-size: 22px; }
      .theme-btn   { padding: 5px 10px; font-size: 10.5px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="card">

    <header class="card-header">
      <div class="brand">
        <div class="brand-icon"><i class="fa-solid fa-lock"></i></div>
        <span class="brand-text">pwdgen<em> · deterministic</em></span>
      </div>
      <div class="theme-toggle" role="group" aria-label="Color theme">
        <button class="theme-btn" data-theme="light">Light</button>
        <button class="theme-btn" data-theme="system">System</button>
        <button class="theme-btn" data-theme="dark">Dark</button>
      </div>
    </header>

    <div class="card-body">

      <!-- Form panel — LEFT on desktop, TOP on mobile -->
      <section class="form-panel">
        <p class="form-eyebrow">Generator</p>
        <h1 class="form-title">Derive passwords<br>from a passphrase</h1>
        <p class="form-lede">Same inputs always produce the same passwords. Nothing is stored or sent anywhere.</p>

        <div class="field">
          <label for="vendor">Vendor name</label>
          <input type="text" id="vendor" placeholder="e.g. github" autocomplete="off" spellcheck="false">
        </div>

        <div class="field">
          <label for="secureString">Master passphrase</label>
          <input type="password" id="secureString" placeholder="Your passphrase" autocomplete="off">
        </div>

        <button class="advanced-toggle" id="advancedToggle" type="button">
          <i class="fa-solid fa-chevron-right chev"></i>
          Advanced options
        </button>

        <div class="advanced hidden" id="advancedOptions">
          <div class="adv-grid">
            <div class="field">
              <label for="passwordLength">Length</label>
              <input type="number" id="passwordLength" min="8" max="22" value="16">
            </div>
            <div class="field">
              <label for="passwordCount">Count</label>
              <input type="number" id="passwordCount" min="1" max="20" value="5">
            </div>
          </div>
          <div class="field" style="margin-bottom:0">
            <label for="disallowedChars">Exclude characters</label>
            <input type="text" id="disallowedChars" placeholder="Characters to exclude" autocomplete="off" spellcheck="false">
          </div>
        </div>

        <button class="generate-btn" id="generateBtn" type="button">Generate passwords</button>
      </section>

      <!-- Results panel — RIGHT on desktop, BOTTOM on mobile -->
      <section class="results-panel" id="resultsPanel" aria-live="polite">
        <span class="panel-label">Results</span>
        <div class="panel-divider"></div>

        <div class="empty-state" id="emptyState">
          <div class="phantom-rows">
            <div class="phantom-row">
              <div class="phantom-num"></div>
              <div class="phantom-bar" style="width:71%"></div>
              <div class="phantom-icon"></div>
              <div class="phantom-icon"></div>
            </div>
            <div class="phantom-row">
              <div class="phantom-num"></div>
              <div class="phantom-bar" style="width:66%"></div>
              <div class="phantom-icon"></div>
              <div class="phantom-icon"></div>
            </div>
            <div class="phantom-row">
              <div class="phantom-num"></div>
              <div class="phantom-bar" style="width:74%"></div>
              <div class="phantom-icon"></div>
              <div class="phantom-icon"></div>
            </div>
          </div>
          <p class="empty-label">No passwords yet</p>
          <p class="empty-sub">Fill the form and generate</p>
        </div>

        <ul class="pw-list hidden" id="passwordList"></ul>
        <div class="error-box hidden" id="errorMessage"></div>
      </section>

    </div>
  </div>

  <!-- generatePasswords inlined so the file works on file:// without a server -->
  <script>
    // Web Crypto port of getpwds.sh — byte-identical output
    async function generatePasswords(input, password, count, length, disallowedChars) {
      count           = count           === undefined ? 5   : count;
      length          = length          === undefined ? 16  : length;
      disallowedChars = disallowedChars === undefined ? ''  : disallowedChars;

      var START_ITER   = 100000;
      var MAX_ATTEMPTS = 300;   // each attempt ~50ms; cap prevents hung tabs

      var hasDigit   = /[0-9]/;
      var hasSpecial = /[@#$%^*_+\-:,.?/]/;

      var encoder    = new TextEncoder();
      var passwordKey = await crypto.subtle.importKey(
        'raw', encoder.encode(password),
        { name: 'PBKDF2' }, false, ['deriveBits']
      );

      var salt      = new Uint8Array(0);         // -nosalt
      var plaintext = encoder.encode(input + '\n'); // echo adds \n

      var passwords = [];
      var iter      = START_ITER;
      var attempts  = 0;

      while (passwords.length < count && attempts < MAX_ATTEMPTS) {
        attempts++;

        // 48 bytes → first 32: AES-256 key, last 16: CBC IV
        var bits = new Uint8Array(await crypto.subtle.deriveBits(
          { name: 'PBKDF2', hash: 'SHA-512', salt: salt, iterations: iter },
          passwordKey, 48 * 8
        ));

        var aesKey = await crypto.subtle.importKey(
          'raw', bits.slice(0, 32),
          { name: 'AES-CBC' }, false, ['encrypt']
        );

        var encrypted = new Uint8Array(await crypto.subtle.encrypt(
          { name: 'AES-CBC', iv: bits.slice(32, 48) }, aesKey, plaintext
        ));

        var base64    = btoa(String.fromCharCode.apply(null, encrypted));
        var candidate = base64.slice(0, length);

        iter++;

        if (!hasDigit.test(candidate) || !hasSpecial.test(candidate)) continue;
        if (disallowedChars) {
          var blocked = false;
          for (var ci = 0; ci < candidate.length; ci++) {
            if (disallowedChars.indexOf(candidate[ci]) !== -1) { blocked = true; break; }
          }
          if (blocked) continue;
        }
        passwords.push(candidate);
      }

      if (passwords.length < count) {
        throw new Error(
          'Only found ' + passwords.length + ' of ' + count +
          ' passwords within ' + MAX_ATTEMPTS + ' attempts. ' +
          'Try a longer length or fewer excluded characters.'
        );
      }

      return passwords;
    }

    // Theme
    function applyTheme(theme) {
      document.documentElement.dataset.theme = theme;
      localStorage.setItem('pwdgen-theme', theme);
      document.querySelectorAll('.theme-btn').forEach(function (btn) {
        btn.classList.toggle('active', btn.dataset.theme === theme);
      });
    }

    // Sync buttons with whatever the <head> script already set
    document.addEventListener('DOMContentLoaded', function () {
      applyTheme(document.documentElement.dataset.theme || 'system');

      document.querySelectorAll('.theme-btn').forEach(function (btn) {
        btn.addEventListener('click', function () { applyTheme(btn.dataset.theme); });
      });

      // Advanced toggle
      var advancedToggle  = document.getElementById('advancedToggle');
      var advancedOptions = document.getElementById('advancedOptions');
      advancedToggle.addEventListener('click', function () {
        var nowHidden = advancedOptions.classList.toggle('hidden');
        advancedToggle.classList.toggle('open', !nowHidden);
      });

      // Generate
      var generateBtn  = document.getElementById('generateBtn');
      var resultsPanel = document.getElementById('resultsPanel');
      var passwordList = document.getElementById('passwordList');
      var emptyState   = document.getElementById('emptyState');
      var errorMessage = document.getElementById('errorMessage');

      generateBtn.addEventListener('click', async function () {
        var vendor          = document.getElementById('vendor').value.trim();
        var passphrase      = document.getElementById('secureString').value.trim();
        var length          = parseInt(document.getElementById('passwordLength').value, 10);
        var count           = parseInt(document.getElementById('passwordCount').value, 10);
        var disallowedChars = document.getElementById('disallowedChars').value;

        if (!vendor)     return showError('Vendor name is required');
        if (!passphrase) return showError('Master passphrase is required');

        try {
          errorMessage.classList.add('hidden');
          generateBtn.disabled    = true;
          generateBtn.textContent = 'Generating…';
          resultsPanel.classList.add('loading');

          var passwords = await generatePasswords(vendor, passphrase, count, length, disallowedChars);
          displayPasswords(passwords);
        } catch (err) {
          showError(err.message);
        } finally {
          generateBtn.disabled    = false;
          generateBtn.textContent = 'Generate passwords';
          resultsPanel.classList.remove('loading');
        }
      });

      function showError(msg) {
        errorMessage.textContent = msg;
        emptyState.classList.add('hidden');
        passwordList.classList.add('hidden');
        errorMessage.classList.remove('hidden');
      }

      var VISIBLE = 4;

      function displayPasswords(passwords) {
        passwordList.innerHTML = '';

        passwords.forEach(function (password, i) {
          var li = document.createElement('li');
          li.className = 'pw-row';

          var num = document.createElement('span');
          num.className   = 'pw-num';
          num.textContent = String(i + 1).padStart(2, '0');

          var wrap = document.createElement('div');
          wrap.className = 'pw-value-wrap';

          var prefix = document.createElement('span');
          prefix.className   = 'pw-prefix';
          prefix.textContent = password.slice(0, VISIBLE);

          var dots = document.createElement('span');
          dots.className   = 'pw-dots';
          dots.textContent = '•'.repeat(Math.max(0, password.length - VISIBLE));

          var full = document.createElement('span');
          full.className   = 'pw-full';
          full.textContent = password;
          full.hidden      = true;

          wrap.appendChild(prefix);
          wrap.appendChild(dots);
          wrap.appendChild(full);

          var actions = document.createElement('div');
          actions.className = 'pw-actions';

          var revealed = false;
          var eyeBtn   = document.createElement('button');
          eyeBtn.className = 'icon-btn';
          eyeBtn.title     = 'Show / hide';
          eyeBtn.setAttribute('aria-pressed', 'false');
          eyeBtn.innerHTML = '<i class="fa-regular fa-eye"></i>';

          eyeBtn.addEventListener('click', function () {
            revealed      = !revealed;
            prefix.hidden = revealed;
            dots.hidden   = revealed;
            full.hidden   = !revealed;
            eyeBtn.classList.toggle('active', revealed);
            eyeBtn.setAttribute('aria-pressed', String(revealed));
            eyeBtn.innerHTML = revealed
              ? '<i class="fa-regular fa-eye-slash"></i>'
              : '<i class="fa-regular fa-eye"></i>';
          });

          var copyBtn = document.createElement('button');
          copyBtn.className = 'icon-btn';
          copyBtn.title     = 'Copy to clipboard';
          copyBtn.innerHTML = '<i class="fa-regular fa-copy"></i>';

          copyBtn.addEventListener('click', async function () {
            try {
              await navigator.clipboard.writeText(password);
              copyBtn.classList.add('copied');
              copyBtn.innerHTML = '<i class="fa-solid fa-check"></i>';
              setTimeout(function () {
                copyBtn.classList.remove('copied');
                copyBtn.innerHTML = '<i class="fa-regular fa-copy"></i>';
              }, 1800);
            } catch (e) { /* clipboard denied in non-secure context */ }
          });

          actions.appendChild(eyeBtn);
          actions.appendChild(copyBtn);
          li.appendChild(num);
          li.appendChild(wrap);
          li.appendChild(actions);
          passwordList.appendChild(li);
        });

        emptyState.classList.add('hidden');
        errorMessage.classList.add('hidden');
        passwordList.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
